version: "3.1"
volumes:
  postgres: ~
services:
  nginx:
    image: nginx:alpine
    working_dir: /app
    volumes:
      - ${PWD}:/app
      - ./docker/hosts/app.conf:/etc/nginx/conf.d/default.conf
      - ./docker/hosts/symfony:/etc/nginx/symfony
    ports:
      - "${NGINX_PORT}:80"
    links:
      - php
    container_name: billing.study-on.local
  postgres:
    ports:  #Нельзя использовать проброс портов на реальном проекте
      - "5432"
    image: postgres:alpine
    volumes:
      - postgres:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pguser
  php:
    build: docker/images/php
    working_dir: /app
    user: ${UID:-1000}:${GID:-1000}
    volumes:
      - ${PWD}:/app
      - ${HOME}/.composer:/.composer
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    links:
      - postgres
  mailhog:
    image: axllent/mailpit
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
