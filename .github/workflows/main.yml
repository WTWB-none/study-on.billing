name: CI
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pgsql, pdo_pgsql
          coverage: pcov
          tools: composer

      - name: Install dependencies
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 -aes-256-cbc -pass pass:ci-passphrase -out config/jwt/private-ci.pem
          openssl pkey -in config/jwt/private-ci.pem -passin pass:ci-passphrase -pubout -out config/jwt/public-ci.pem
          cat << EOF > .env.local
          DATABASE_URL="postgresql://pguser:pguser@postgres:5432/study_on?serverVersion=16&charset=utf8"
          JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private-ci.pem"
          JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public-ci.pem"
          JWT_PASSPHRASE="ci-passphrase"
          EOF
          composer install --no-interaction --prefer-dist

      - name: Start Docker services
        run: |
          docker compose version
          docker compose build
          docker compose up -d
          docker ps -a
          docker compose exec -T postgres sh -c 'until pg_isready -h 127.0.0.1 -p 5432 -U pguser; do sleep 1; done'

      - name: Prepare test database
        run: |
          cat << EOF > .env.test.local
          DATABASE_URL="postgresql://pguser:pguser@postgres:5432/study_on?serverVersion=16&charset=utf8"
          JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private-ci.pem"
          JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public-ci.pem"
          JWT_PASSPHRASE="ci-passphrase"
          EOF
          docker compose exec -T php bin/console doctrine:database:drop --force --env=test || true
          docker compose exec -T php bin/console doctrine:database:create --env=test
          docker compose exec -T php bin/console doctrine:migrations:migrate -n --env=test
          docker compose exec -T php bin/console doctrine:fixtures:load -n --env=test

      - name: Run PHPUnit
        run: docker compose exec -T php bin/phpunit --do-not-cache-result
